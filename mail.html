<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Anas.dev</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cyan: #00e5ff;
            --cyan2: #00b8cc;
            --bg: #080808;
            --bg2: #0f0f0f;
            --bg3: #161616;
            --bg4: #1c1c1c;
            --text: #f2f2f2;
            --muted: #666;
            --border: #1e1e1e;
            --font-head: 'Syne', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-body: 'DM Sans', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            cursor: none;
            overflow-x: hidden;
        }

        /* ── Cursor ── */
        #cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--cyan);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
        }

        #cursor-ring {
            position: fixed;
            width: 36px;
            height: 36px;
            border: 1px solid rgba(0, 229, 255, 0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: all 0.12s ease;
        }

        /* ── Grid bg ── */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(#1e1e1e 1px, transparent 1px),
                linear-gradient(90deg, #1e1e1e 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
        }

        /* ── Orb ── */
        .bg-orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.05) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: orb-pulse 5s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes orb-pulse {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.6;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.15);
                opacity: 1;
            }
        }

        /* ── Noise ── */
        .noise {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px;
        }

        /* ── Card ── */
        .card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 520px;
            background: var(--bg2);
            border: 0.5px solid #2a2a2a;
            border-radius: 16px;
            padding: 40px 36px 36px;
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.04), 0 30px 80px rgba(0, 0, 0, 0.6);
            opacity: 0;
            animation: slideUp 0.8s ease 0.2s forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Card header ── */
        .card-eyebrow {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--cyan);
            letter-spacing: 3px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .card-eyebrow::before {
            content: '';
            width: 24px;
            height: 1px;
            background: var(--cyan);
        }

        .card-title {
            font-family: var(--font-head);
            font-size: 30px;
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 4px;
        }

        .card-title span {
            color: var(--cyan);
        }

        .card-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 28px;
        }

        .divider {
            height: 0.5px;
            background: var(--border);
            margin-bottom: 26px;
        }

        /* ── Form ── */
        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .field label::before {
            content: '';
            width: 4px;
            height: 4px;
            background: var(--cyan);
            border-radius: 50%;
        }

        .field input,
        .field textarea {
            background: var(--bg3);
            border: 0.5px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 14px;
            padding: 11px 14px;
            outline: none;
            width: 100%;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
        }

        .field input:focus,
        .field textarea:focus {
            border-color: var(--cyan2);
            background: var(--bg4);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.07);
        }

        .field input::placeholder,
        .field textarea::placeholder {
            color: #333;
            font-family: var(--font-mono);
            font-size: 11px;
        }

        .field textarea {
            resize: vertical;
            min-height: 120px;
            max-height: 260px;
            line-height: 1.7;
        }

        /* Name + Email side by side */
        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* ── Send button ── */
        .send-btn {
            margin-top: 4px;
            width: 100%;
            padding: 13px;
            background: var(--cyan);
            color: #000;
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0, 229, 255, 0.25);
        }

        .send-btn .arrow {
            transition: transform 0.2s;
        }

        .send-btn:hover .arrow {
            transform: translate(3px, -2px);
        }

        /* ── Back link ── */
        .back-link {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted);
            text-decoration: none;
            opacity: 0;
            animation: slideUp 0.8s ease 0.5s forwards;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--cyan);
        }

        /* ── Mobile ── */
        @media (max-width: 520px) {
            body {
                cursor: auto;
                padding: 24px 16px;
            }

            #cursor,
            #cursor-ring {
                display: none;
            }

            .card {
                padding: 28px 20px 24px;
            }

            .card-title {
                font-size: 24px;
            }

            .field-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="bg-grid"></div>
    <div class="bg-orb"></div>
    <div class="noise"></div>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <div class="card">
        <div class="card-eyebrow">Get In Touch</div>
        <h1 class="card-title">Send me a <span>message.</span></h1>
        <p class="card-sub">&gt; I reply within 24 hours_</p>
        <div class="divider"></div>

        <form id="contact-form" action="https://formspree.io/f/xyklbkrp" method="POST">

            <div class="field-row">
                <div class="field">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name" required>
                </div>
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>
            </div>

            <div class="field">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="What's this about?" required>
            </div>

            <div class="field">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
            </div>

            <button type="submit" class="send-btn">
                Send Message <span class="arrow">↗</span>
            </button>

        </form>
    </div>

    <a class="back-link" href="index.html">← Back to portfolio</a>

    <script>
        if (!('ontouchstart' in window)) {
            const c = document.getElementById('cursor');
            const r = document.getElementById('cursor-ring');
            let mx = 0, my = 0, rx = 0, ry = 0;
            document.addEventListener('mousemove', e => {
                mx = e.clientX; my = e.clientY;
                c.style.left = mx + 'px'; c.style.top = my + 'px';
            });
            (function loop() {
                rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
                r.style.left = rx + 'px'; r.style.top = ry + 'px';
                requestAnimationFrame(loop);
            })();
            document.querySelectorAll('a,button,input,textarea').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    c.style.width = '6px'; c.style.height = '6px';
                    r.style.width = '52px'; r.style.height = '52px';
                    r.style.borderColor = 'rgba(0,229,255,0.6)';
                });
                el.addEventListener('mouseleave', () => {
                    c.style.width = '10px'; c.style.height = '10px';
                    r.style.width = '36px'; r.style.height = '36px';
                    r.style.borderColor = 'rgba(0,229,255,0.4)';
                });
            });
        }
    </script>
</body>

</html>
